services:
  - type: web
    name: laser-tag-scheduler
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: laser-tag-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: ZOZOSOCUTE1908
      - key: NODE_ENV
        value: production

databases:
  - name: laser-tag-db
    plan: free
    databaseName: laser_tag_scheduler
